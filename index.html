<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обмен валют</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:Montserrat, Arial;
}

/* центр */
.container{
  max-width:520px;
  margin:0 auto;
  padding:20px;
}

h1{text-align:center;font-size:26px;}
h2{margin-top:30px;}

.cta{
  display:block;
  text-align:center;
  background:#FFD700;
  color:#000;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  margin-top:15px;
  text-decoration:none;
}

/* карточки */
.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.checks{
  text-align:left;
  color:#ccc;
  line-height:1.6;
}

/* FOMO */
.fomo{
  display:flex;
  align-items:center;
  gap:10px;
  background:#111;
  border:1px solid #FFD700;
  padding:10px;
  border-radius:10px;
  margin:15px 0;
  font-size:13px;
  transition:0.3s;
}

.fomo img{
  width:28px;
  height:28px;
  border-radius:50%;
}

/* TikTok */
.feed{
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

.video-item{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

.video-item img,
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* play */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  color:#FFD700;
}

/* progress */
.progress{
  position:absolute;
  bottom:0;
  left:0;
  height:4px;
  background:#FFD700;
  width:0%;
}

/* фикс кнопки */
.contact-fixed{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  z-index:9999;
}

.cf-btn{
  flex:1;
  text-align:center;
  padding:12px;
  font-weight:bold;
  color:#000;
  text-decoration:none;
}

.whatsapp{background:#25D366;}
.telegram{background:#229ED9;}
.imo{background:#00AEEF;}
</style>

</head>

<body>

<div class="container">

<h1>МЕНЯЕМ ДЕНЬГИ МЕЖДУ СТРАНАМИ</h1>

Обменять сейчас
<!-- FOMO -->

<div id="fomo" class="fomo"></div>

<h2>Как работает</h2>
<div class="card checks">
✔ Пишете → получаете курс<br>
✔ Делаете перевод<br>
✔ Получаете деньги
</div>

<h2>Популярные направления</h2>
<div class="card checks">
✔ Россия<br>
✔ Турция<br>
✔ Узбекистан<br>
✔ Индонезия<br>
✔ Танзания
</div>

</div>

<!-- TikTok лента -->

<div class="feed">

<div class="video-item" data-src="REW_ru/1.mp4">
<img src="POS_ru/1.jpg">
<div class="play">▶</div>
</div>

<div class="video-item" data-src="REW_ru/2.mp4">
<img src="POS_ru/2.jpg">
<div class="play">▶</div>
</div>

<div class="video-item" data-src="REW_ru/3.mp4">
<img src="POS_ru/3.jpg">
<div class="play">▶</div>
</div>

</div>

<!-- кнопки -->

<div class="contact-fixed">
<a href="https://wa.me/255756687444" class="cf-btn whatsapp">WhatsApp</a>
<a href="https://t.me/app2cas" class="cf-btn telegram">Telegram</a>
<a href="https://s.imoim.net/5LFqJT" class="cf-btn imo">IMO</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

/* FOMO */
const fomoList=[
{name:'Александр',text:'2300 USD'},
{name:'Мария',text:'1500 EUR'},
{name:'Илья',text:'53 000 RUB'},
{name:'Аноним',text:'22 000 USDT'}
];

let i=0;
const fomo=document.getElementById('fomo');

function updateFomo(){
  fomo.style.opacity=0;
  setTimeout(()=>{
    let f=fomoList[i];
    fomo.innerHTML = `
      <img src="https://i.pravatar.cc/50?img=${Math.floor(Math.random()*70)}">
      <div><b>${f.name}</b> обменял ${f.text}</div>
    `;
    fomo.style.opacity=1;
    i=(i+1)%fomoList.length;
  },300);
}

updateFomo();
setInterval(updateFomo,4000);


/* TikTok PRO MAX */
let activeVideo=null;

const observer=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{

if(entry.isIntersecting){

const item=entry.target;

// если видео ещё нет
if(!item.querySelector('video')){

const v=document.createElement('video');
v.src=item.dataset.src;
v.autoplay=true;
v.muted=true;
v.playsInline=true;

item.innerHTML='';
item.appendChild(v);

// progress bar
const bar=document.createElement('div');
bar.className='progress';
item.appendChild(bar);

v.ontimeupdate=()=>{
  if(v.duration){
    bar.style.width = (v.currentTime / v.duration * 100) + '%';
  }
};

// автопереход
v.onended=()=>{
  if(item.nextElementSibling){
    item.nextElementSibling.scrollIntoView({behavior:'smooth'});
  }
};

// x2 скорость
v.onclick=()=>{
  v.playbackRate = v.playbackRate === 1 ? 2 : 1;
};

activeVideo=v;

}else{

const v=item.querySelector('video');

if(activeVideo && activeVideo!==v){
  activeVideo.pause();
}

v.play();
activeVideo=v;

}

}else{

const v=entry.target.querySelector('video');
if(v) v.pause();

}

});
},{threshold:0.7});

document.querySelectorAll('.video-item').forEach(el=>observer.observe(el));

});
</script>

</body>
</html>
