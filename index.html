<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обмен валют и отправка денег – app2.cash</title>
<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:'Montserrat', Arial, sans-serif;
  line-height:1.5;
  padding-bottom:100px;
}

/* контейнер */
.container{
  max-width:540px;
  margin:0 auto;
  padding:20px;
}

/* язык */
.lang {
  text-align: center;
  display: flex;
  justify-content: center;
  gap:6px;
  margin-bottom:10px;
}
.lang a{
  text-decoration:none;
  font-weight:bold;
  padding:2px 6px;
  border-radius:6px;
  color:#FFD700;
  transition:0.3s;
}
.lang a:hover{color:#fff;}
.lang a.active{
  background:#FFD700;
  color:#000;
}

/* заголовки */
h1{text-align:center;font-size:28px;margin-bottom:5px;}
h2{margin-top:35px;font-size:22px;border-bottom:1px solid #333;padding-bottom:8px;}
h3{font-weight:400;color:#ccc;text-align:center;margin-bottom:5px;}
h4{margin-top:10px;font-weight:500;color:#FFD700;}

/* кнопки */
.cta{
  display:block;
  text-align:center;
  background:linear-gradient(90deg,#FFD700,#FFA500);
  color:#000;
  padding:14px;
  border-radius:16px;
  font-weight:bold;
  margin:20px 0;
  text-decoration:none;
  transition:0.3s;
}
.cta:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(255,215,0,0.4);
}

/* карточки */
.card{
  background:#111;
  padding:18px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 4px 15px rgba(255,255,255,0.05);
}

/* FOMO */
.fomo{
  display:flex;
  align-items:center;
  gap:12px;
  background:#111;
  border:1px solid #FFD700;
  padding:12px;
  border-radius:12px;
  margin:15px 0;
  font-size:14px;
  transition:opacity 0.5s;
  box-shadow:0 4px 12px rgba(255,215,0,0.2);
}
.fomo img{
  width:36px;
  border-radius:50%;
}

/* скриншоты */
.screens{
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-top:10px;
  padding-bottom:10px;
}
.screens img{
  width:140px;
  border-radius:12px;
  border:2px solid gold;
  transition: transform 0.3s;
  cursor:pointer;
}
.screens img:hover{ transform:scale(1.05); }

/* lightbox */
#lightbox{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
#lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

/* видео */
.video-slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 0;
}
.video-slider::-webkit-scrollbar{display:none;}
.video-item{
  flex:0 0 auto;
  width:200px;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}
.video-item img{width:100%;}
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:#FFD700;
}

/* одна кнопка */
.contact-fixed{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  z-index:99;
}
.cf-btn{
  flex:1;
  text-align:center;
  padding:16px;
  font-weight:bold;
  color:#000;
  background:linear-gradient(90deg,#FFD700,#FFA500);
  text-decoration:none;
}

/* input */
#amount{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
  margin-top:10px;
}

/* преимущества */
.checks{ color:#ccc; padding-left:10px; }
</style>
</head>

<body>

<div class="container">

<!-- Языки -->
<div class="lang">
  <a href="/" class="active">🇷🇺 Русский</a>
  <a href="/en">🇬🇧 English</a>
  <a href="/cn">🇨🇳 中文</a>
</div>

<!-- Логотип -->
<section style="text-align:center; padding:20px;">
  <img src="/logo-bull.png" style="width:120px;">
</section>

<h1>Обмен валют и переводы</h1>
<h3>Туристы, студенты, мигранты,<br>бизнес и частные клиенты</h3>

<div id="fomo" class="fomo"></div>

<h2>Как это работает</h2>
<div class="card checks">
✔ Отправляете запрос → Получаете курс<br>
✔ Переводите вашу валюту<br>
✔ Вы или ваш контакт получаете нужную валюту
</div>

<a href="https://taplink.cc/maratyarkov" class="cta">Все способы связи</a>

<h2>Сколько вы получите?</h2>
<input id="amount" placeholder="Введите сумму">
<div id="result">≈ —</div>

</div>

<!-- ОДНА КНОПКА -->
<div class="contact-fixed">
  <a href="https://taplink.cc/maratyarkov" target="_blank" class="cf-btn">
    Все способы связи
  </a>
</div>

<script>
document.getElementById("amount").oninput = function(){
  let v = this.value;
  document.getElementById("result").innerText = "≈ " + (v * 0.97).toFixed(2);
}
</script>

</body>
</html>
