function useRates(){
  const[rates,setRates]=useState(BASE);
  const[updated,setUpdated]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json()).then(d=>{
      if(d.rates){setRates({USD:1,EUR:d.rates.EUR,RUB:d.rates.RUB,AED:d.rates.AED,USDT:1,GBP:d.rates.GBP,CNY:d.rates.CNY,TZS:d.rates.TZS,ZAR:d.rates.ZAR,KES:d.rates.KES});setUpdated(new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}));}

}

function ChatTab({t,profile}){
  const[sessionId]=useState(()=>([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)));

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  useEffect(()=>{
    const iv=setInterval(async()=>{
      if(!sessionCreated)return;
      const after=lastPoll.current?`&created_at=gt.${encodeURIComponent(lastPoll.current)}`:"";
      const res=await fetch(`${SB_URL}/rest/v1/chat_messages?session_id=eq.${sessionId}&role=eq.manager&order=created_at.asc${after}`,{headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});

    }catch(err){
      const reply="Менеджер скоро свяжется с вами! Или напишите напрямую в Telegram @app2cas 💬";
      setMsgs(m=>[...m,{role:"ai",content:reply,id:Math.random().toString(36).slice(2)}]);

    }
    setLoading(false);
  }
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"0 16px 12px"}}><div style={{fontWeight:700,fontSize:20,marginBottom:4}}>{t.chatTitle}</div><div style={{fontSize:12,color:C.green}}>{t.aiOn}</div></div>

function MinerTab({lang}) {
  const[bal,setBal]=useState(()=>{try{return parseFloat(sessionStorage.getItem("app2c")||"0");}catch(e){return 0;}});
  const[mining,setMining]=useState(false);
  const[particles,setParticles]=useState([]);
  const MAX=10; const PER=0.000001;

  const TX={
    ru:{title:"APP2C Майнинг",sub:"Тапай монету — майни APP2C стейблкоин",bal:"Баланс",disc:"Скидка на комиссию",done:"Максимум! Скидка активирована на обмен",info:"1 APP2C = $1 · Только как скидка на сервис · Лимит 10 APP2C"},
    en:{title:"APP2C Mining",sub:"Tap the coin to mine APP2C stablecoin",bal:"Balance",disc:"Exchange Discount",done:"Max reached! Discount applied to exchange",info:"1 APP2C = $1 · Service discount only · Max 10 APP2C"},
    cn:{title:"APP2C 挖矿",sub:"点击金币挖矿 APP2C 稳定币",bal:"余额",disc:"兑换折扣",done:"已达上限！折扣已激活",info:"1 APP2C = $1 · 仅限服务折扣 · 上限 10 APP2C"}
  };
  const l=lang||"ru"; const tx=TX[l]||TX.ru;

  function playTap(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime+0.15);
    }catch(e){}
  }
  function tap(e){
    if(bal>=MAX)return;
    const nb=Math.min(MAX,parseFloat((bal+PER).toFixed(6)));
    setBal(nb);try{sessionStorage.setItem("app2c",nb.toString());}catch(e){} playTap();
    setMining(true);
    setTimeout(()=>setMining(false),180);
    const rect=e.currentTarget.getBoundingClientRect();
    const id=Date.now()+Math.random();
    setParticles(p=>[...p,{id,x:e.clientX-rect.left,y:e.clientY-rect.top}]);
    setTimeout(()=>setParticles(p=>p.filter(pt=>pt.id!==id)),900);
  }

  const pct=Math.min(100,(bal/MAX)*100);
  const done=bal>=MAX;
  const disc=Math.floor(bal);
  const need=(MAX-bal).toFixed(6);

  return(
    <div className="ani" style={{padding:"16px 16px 80px",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{fontWeight:700,fontSize:20,color:C.gold,marginBottom:4}}>{tx.title}</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:28,textAlign:"center"}}>{tx.sub}</div>

      <div style={{position:"relative",marginBottom:28}} onClick={tap}>
        <div style={{
          width:190,height:190,borderRadius:"50%",
          background:done?"linear-gradient(135deg,#2FD78C,#0F6E56)":"linear-gradient(135deg,#F0B429,#c8930a)",
          display:"flex",alignItems:"center",justifyContent:"center",
          cursor:done?"default":"pointer",
          boxShadow:mining?"0 0 60px #F0B42999":"0 0 24px #F0B42944",
          transform:mining?"scale(0.91)":"scale(1)",
          transition:"transform .12s,box-shadow .2s",
          userSelect:"none"
        }}>
          <div style={{textAlign:"center",pointerEvents:"none"}}>
            <div style={{fontSize:52}}>💰</div>
            <div style={{fontSize:15,fontWeight:900,color:"#000",marginTop:4}}>APP2C</div>
            <div style={{fontSize:11,color:"#00000066",marginTop:2}}>{done?"MAX ✓":"TAP"}</div>
          </div>
        </div>
        {particles.map(p=>(
          <div key={p.id} style={{position:"absolute",left:p.x-20,top:p.y-10,color:C.gold,fontWeight:700,fontSize:13,pointerEvents:"none",animation:"floatUp .9s ease forwards",zIndex:10,whiteSpace:"nowrap"}}>+0.000001</div>
        ))}
      </div>

      <div style={{width:"100%",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:6}}>
          <span>{tx.bal}</span>
          <span style={{color:C.gold,fontWeight:700}}>{bal.toFixed(4)} / 10 APP2C</span>
        </div>
        <div style={{height:10,background:C.card2,borderRadius:5,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:done?C.green:C.gold,borderRadius:5,transition:"width .3s"}}/>
        </div>
      </div>

      <div style={{width:"100%",background:C.card,border:"1px solid "+(done?C.green:C.border),borderRadius:14,padding:"20px 16px",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,letterSpacing:2,textTransform:"uppercase"}}>{tx.bal}</div>
        <div style={{fontSize:56,fontWeight:900,color:done?C.green:C.gold,letterSpacing:-1,lineHeight:1}}>{bal.toFixed(4)}</div>
        <div style={{fontSize:13,color:C.muted,marginTop:6}}>APP2C</div>
        <div style={{fontSize:11,color:C.muted,marginTop:8}}>{done?tx.done:(l==="cn"?"还需"+need+" APP2C":l==="en"?"Need "+need+" more APP2C":"Ещё "+need+" APP2C")}</div>
      </div>

      <div style={{width:"100%",background:C.card2,borderRadius:12,padding:"12px 14px",fontSize:11,color:C.muted,textAlign:"center",lineHeight:1.8}}>{tx.info}</div>
    </div>
  );
}

        <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:"24px 24px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",animation:"slideUp .3s ease",position:"relative"}}>

          <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>

          {step==="info"&&(
            <div>
              <div style={{fontSize:20,fontWeight:900,color:col,marginBottom:4}}>{tx.title}</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:16}}>{tx.sub}</div>
              {tx.points.map((p,i)=>(
                <div key={i} style={{fontSize:13,color:C.text,marginBottom:8}}>{p}</div>
              ))}
              <div style={{background:C.card2,borderRadius:12,padding:"12px 14px",margin:"16px 0",fontSize:12,color:C.gold,fontWeight:600}}>📊 {tx.math}</div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{tx.ask}:</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {tx.aiQ.map((q,i)=>(
                    <div key={i} onClick={()=>askModalAI(q,type)} style={{background:C.card2,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.text,cursor:"pointer",border:`1px solid ${C.border}`}}>{q}</div>
                  ))}
                </div>
                {modalAiReply&&<div style={{background:"#0D1A0D",border:`1px solid ${C.green}44`,borderRadius:10,padding:"12px 14px",marginTop:10,fontSize:13,color:C.green,lineHeight:1.6}}>{modalAiReply==="..."?"⏳...":modalAiReply}</div>}
              </div>
              {type==="partner"?(
                <div onClick={()=>setStep("register")} style={{background:C.gold,color:"#000",borderRadius:14,padding:"14px",textAlign:"center",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:12}}>{tx.cta}</div>
              ):(
                <div>
                  <input id="fran-contact-input" placeholder={tx.ph} style={{width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,marginBottom:10,outline:"none"}}/>
                  {!modalSent?(
                    <div onClick={async()=>{
  const v=document.getElementById("fran-contact-input");
  const contact=v?v.value:"";
  setModalSending(true);
  try{
    const tgMsg="📋 <b>Заявка: Франшиза</b>\n📞 "+contact+"\n🌐 "+lang;
    await fetch("https://api.telegram.org/bot"+TG_BOT_TOKEN+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:TG_CHAT_ID,text:tgMsg,parse_mode:"HTML"})});
    await fetch("/api/index",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contact:contact||"anonymous",channel:"tg",source:"fran_modal",extra:{notes:"Franchise request"}})});
  }catch(e){}
  setModalSending(false);
  setModalSent(true);
}} style={{background:C.blue,color:"#fff",borderRadius:14,padding:"14px",textAlign:"center",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:12}}>{modalSending?"⏳...":tx.cta}</div>
                  ):(
                    <div style={{textAlign:"center",padding:"12px 0",color:C.green,fontWeight:700}}>{tx.sent}</div>
                  )}
                </div>
              )}
              <a href={tx.moreUrl} target="_blank" rel="noopener" style={{display:"block",textAlign:"center",fontSize:12,color:C.muted,textDecoration:"underline"}}>{tx.more} ↗</a>
            </div>
          )}

          {step==="register"&&(
            <div>
              <div style={{fontSize:18,fontWeight:900,color:C.gold,marginBottom:4}}>{lang==="ru"?"Регистрация партнёра":lang==="en"?"Partner Registration":"合作伙伴注册"}</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20}}>{lang==="ru"?"Заполните данные — можно пропустить любой шаг":lang==="en"?"Fill in — any step can be skipped":"填写信息——任何步骤均可跳过"}</div>

              {[
                {label:lang==="ru"?"1. Имя *":lang==="en"?"1. Name *":"1. 姓名 *",val:regName,set:handleNameChange,ph:lang==="ru"?"Ваше имя":lang==="en"?"Your name":"您的姓名",req:true},
                {label:lang==="ru"?"2. Email":lang==="en"?"2. Email":"2. 电子邮件",val:regEmail,set:setRegEmail,ph:"email@example.com",req:false},
                {label:lang==="ru"?"3. Telegram":lang==="en"?"3. Telegram":"3. Telegram",val:regTg,set:setRegTg,ph:"@username",req:false},
                {label:lang==="ru"?"4. WhatsApp":lang==="en"?"4. WhatsApp":"4. WhatsApp",val:regWa,set:setRegWa,ph:"+1234567890",req:false},
              ].map(({label,val,set,ph,req},i)=>(
                <div key={i} style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:val?C.gold:C.muted,marginBottom:5,letterSpacing:0.5,transition:"color .2s"}}>{label}</div>
                  <input value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={{width:"100%",background:val?"#1A1400":C.card2,border:`1px solid ${val?C.gold:C.border}`,borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",transition:"all .2s",boxSizing:"border-box"}}/>
                </div>
              ))}

              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:regPromo?C.gold:C.muted,marginBottom:5,letterSpacing:0.5}}>{lang==="ru"?"🎁 Ваш промокод":lang==="en"?"🎁 Your promo code":"🎁 您的促销码"}</div>
                <input value={regPromo} onChange={e=>setRegPromo(e.target.value.toUpperCase())} placeholder={lang==="ru"?"Сгенерируется автоматически":lang==="en"?"Auto-generated":"自动生成"} style={{width:"100%",background:regPromo?"#1A1400":C.card2,border:`1px solid ${regPromo?C.gold:C.border}`,borderRadius:12,padding:"12px 14px",color:C.gold,fontSize:16,fontWeight:700,outline:"none",letterSpacing:2,boxSizing:"border-box"}}/>
                <div style={{fontSize:11,color:C.muted,marginTop:4}}>{lang==="ru"?"Можете изменить на свой":lang==="en"?"You can change it":"您可以更改"}</div>
              </div>

              <div onClick={doRegister} style={{background:regName.trim()?C.gold:"#333",color:regName.trim()?"#000":C.muted,borderRadius:14,padding:"14px",textAlign:"center",fontWeight:700,fontSize:15,cursor:regName.trim()?"pointer":"default",marginBottom:10}}>
                {regSending?"⏳...":(lang==="ru"?"Зарегистрироваться →":lang==="en"?"Register →":"注册 →")}
              </div>
              <div onClick={()=>setStep("info")} style={{textAlign:"center",fontSize:12,color:C.muted,cursor:"pointer"}}>← {lang==="ru"?"Назад":lang==="en"?"Back":"返回"}</div>
            </div>
          )}

          {step==="success"&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:52,marginBottom:12}}>🎉</div>
              <div style={{fontSize:20,fontWeight:900,color:C.gold,marginBottom:8}}>{lang==="ru"?"Вы партнёр app2.cash!":lang==="en"?"You are an app2.cash Partner!":"您已成为app2.cash合作伙伴！"}</div>
              <div style={{background:C.card2,borderRadius:14,padding:"16px",marginBottom:16}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{lang==="ru"?"Ваш промокод":lang==="en"?"Your promo code":"您的促销码"}</div>
                <div style={{fontSize:28,fontWeight:900,color:C.gold,letterSpacing:3,marginBottom:12}}>{regPromo}</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{lang==="ru"?"Ваша реферальная ссылка":lang==="en"?"Your referral link":"您的推荐链接"}</div>
                <div style={{fontSize:12,color:C.blue,wordBreak:"break-all",marginBottom:12}}>{regLink}</div>
                <div onClick={copyLink} style={{background:C.gold,color:"#000",borderRadius:10,padding:"10px",fontWeight:700,fontSize:13,cursor:"pointer"}}>📋 {lang==="ru"?"Скопировать ссылку":lang==="en"?"Copy link":"复制链接"}</div>
              </div>
              <div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>{lang==="ru"?"Менеджер свяжется с вами в течение часа":lang==="en"?"Manager will contact you within an hour":"客服将在一小时内联系您"}</div>
              <div onClick={onClose} style={{marginTop:16,color:C.muted,fontSize:13,cursor:"pointer"}}>✕ {lang==="ru"?"Закрыть":lang==="en"?"Close":"关闭"}</div>
            </div>
          )}
        </div>
      </div>
    );
  }
  const[showPromo,setShowPromo]=useState(false);
  const[lang,setLang]=useState("ru");
  const[tab,setTab]=useState("home");
  const[profile,setProfile]=useState({name:"",phone:"",email:""});
  const[pwaDismissed,setPwaDismissed]=useState(false);
  const{rates,updated,loading:rateLoad}=useRates();
  const t=T[lang];
  function appRate(from,to){if(!rates[from]||!rates[to])return null;return(rates[to]/rates[from])*(1-SPREAD);}
  function finishOnboarding(){setOnboarded(true);setTimeout(()=>setShowPromo(true),600);}
  return(
    <>
      <style>{appCss}</style>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:430,margin:"0 auto",background:C.bg}}>
        {!onboarded?<Onboarding onDone={finishOnboarding} setLang={setLang} lang={lang}/>:(
          <>
            {showPromo&&<PromoModal onClose={()=>setShowPromo(false)} goChat={()=>setTab("chat")} t={t}/>}
            {showPartner&&<ModalOverlay type="partner" onClose={()=>{setShowPartner(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            {showFran&&<ModalOverlay type="fran" onClose={()=>{setShowFran(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            {showPartner&&<ModalOverlay type="partner" onClose={()=>{setShowPartner(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            {showFran&&<ModalOverlay type="fran" onClose={()=>{setShowFran(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            {showPartner&&<ModalOverlay type="partner" onClose={()=>{setShowPartner(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            {showFran&&<ModalOverlay type="fran" onClose={()=>{setShowFran(false);setModalSent(false);setModalAiReply("");setModalHandle("");}}/>}
            <div style={{background:C.card,padding:"14px 16px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:C.gold,letterSpacing:-1}}>app2.cash</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:11,color:rateLoad?C.muted:C.green}}>{rateLoad?t.rateLoad:updated?`${t.rateOk} ${updated}`:t.rateOk}</div>
                <div style={{display:"flex",gap:5}}>{[["ru","🇷🇺"],["en","🇺🇸"],["cn","🇨🇳"]].map(([l,f])=><span key={l} onClick={()=>setLang(l)} style={{fontSize:18,cursor:"pointer",opacity:lang===l?1:.4,transition:"opacity .2s"}}>{f}</span>)}</div>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",paddingTop:16}}>
              {tab==="home"&&<HomeTab profile={profile} goExchange={()=>setTab("exchange")} goChat={()=>setTab("chat")} appRate={appRate} t={t} lang={lang} pwaDismissed={pwaDismissed} setPwaDismissed={setPwaDismissed} onPartner={()=>setShowPartner(true)} onFran={()=>setShowFran(true)}/>}
              {tab==="exchange"&&<ExchangeTab profile={profile} appRate={appRate} t={t} lang={lang}/>}
              
              {tab==="chat"&&<ChatTab t={t} profile={profile}/>}
              {tab==="miner"&&<MinerTab lang={lang}/>}
              {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile} t={t} setLang={setLang} lang={lang}/>}
            </div>
            <div style={{background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0",paddingBottom:"calc(8px + env(safe-area-inset-bottom))"}}>
              {["home","exchange","chat","miner","profile"].map((id,i)=>(
                <div key={id} onClick={()=>setTab(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"6px 0",position:"relative"}}>
                  <span style={{fontSize:20,filter:tab===id?"none":"grayscale(1) opacity(.4)",transition:"filter .2s"}}>{ICONS[i]}</span>
                  <span style={{fontSize:10,color:tab===id?C.gold:C.muted,fontWeight:tab===id?600:400}}>{t.tabs[i]}</span>
                  {tab===id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:2,background:C.gold,borderRadius:2}}/>}
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
