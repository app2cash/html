<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обмен валют и отправка денег – app2.cash</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:'Montserrat', Arial, sans-serif;
  line-height:1.5;
  padding-bottom:100px;
}

.container{
  max-width:540px;
  margin:0 auto;
  padding:20px;
}

.lang{
  text-align:center;
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:10px;
}

.lang a{
  text-decoration:none;
  font-weight:bold;
  padding:2px 6px;
  border-radius:6px;
  color:#FFD700;
}

h1{text-align:center;font-size:28px;margin-bottom:5px;}
h2{margin-top:35px;font-size:22px;border-bottom:1px solid #333;padding-bottom:8px;}
h3{font-weight:400;color:#ccc;text-align:center;margin-bottom:5px;}
h4{margin-top:10px;font-weight:500;color:#FFD700;}

.cta{
  display:block;
  text-align:center;
  background:linear-gradient(90deg,#FFD700,#FFA500);
  color:#000;
  padding:14px;
  border-radius:16px;
  font-weight:bold;
  margin:20px 0;
  text-decoration:none;
}

.card{
  background:#111;
  padding:18px;
  border-radius:16px;
  margin-top:15px;
}

.screens{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.screens img{
  width:140px;
  border-radius:12px;
  border:2px solid gold;
}

/* ========================= */
/* КНОПКА МЕНЕДЖЕР ОНЛАЙН */
/* ========================= */

.contact-fixed{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  z-index:999;
}

.manager-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#FFD700,#FFA500);
  border:none;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

/* ========================= */
/* TAPLINK OVERLAY */
/* ========================= */

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.overlay-content{
  width:95%;
  height:90%;
  background:#111;
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

.overlay iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff4444;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  z-index:2;
}
</style>
</head>

<body>

<div class="container">

<div class="lang">
  <a href="/" style="font-weight:bold;">🇷🇺 Русский</a>
  <a href="/en">🇬🇧 English</a>
  <a href="/cn">🇨🇳 中文</a>
</div>

<h1>Обмен валют и переводы</h1>
<h3>Быстро и безопасно</h3>

<h2>Скриншоты</h2>
<div class="screens">
  <img src="/IMG_ru/1.jpg">
  <img src="/IMG_ru/2.jpg">
  <img src="/IMG_ru/3.jpg">
</div>

</div>

<!-- КНОПКА -->
<div class="contact-fixed">
  <button class="manager-btn" onclick="openTaplink()">
    Менеджер онлайн
  </button>
</div>

<!-- ОВЕРЛЕЙ TAPLINK -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <button class="close-btn" onclick="closeTaplink()">✕</button>
    <iframe src="https://taplink.cc/maratyarkov"></iframe>
  </div>
</div>

<script>
function openTaplink(){
  document.getElementById('overlay').style.display='flex';
}

function closeTaplink(){
  document.getElementById('overlay').style.display='none';
}
</script>

</body>
</html>
