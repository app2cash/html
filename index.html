<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обмен валют</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:Montserrat, Arial;
  padding-bottom:80px;
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:20px;
}

.lang{
  text-align:right;
}
.lang a{
  color:#FFD700;
  text-decoration:none;
  font-weight:bold;
}

h1{text-align:center;font-size:26px;}
h2{margin-top:30px;}

.cta{
  display:block;
  text-align:center;
  background:#FFD700;
  color:#000;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  margin-top:15px;
  text-decoration:none;
}

.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.checks{ text-align:left; color:#ccc; }

/* FOMO */
.fomo{
  display:flex;
  align-items:center;
  gap:10px;
  background:#111;
  border:1px solid #FFD700;
  padding:10px;
  border-radius:10px;
  margin:15px 0;
  font-size:13px;
  transition:0.3s;
}

.fomo img{
  width:28px;
  border-radius:50%;
}

/* скриншоты */
.screens{
  display:flex;
  overflow-x:auto;
  gap:10px;
}
.screens img{
  width:140px;
  border-radius:10px;
  border:2px solid gold;
}

/* видео */
.video-item{
  margin-top:20px;
  position:relative;
}

.video-item img{
  width:100%;
  border-radius:12px;
}

video{
  width:100%;
  border-radius:12px;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:#FFD700;
}

/* фикс кнопки */
.contact-fixed{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
}

.cf-btn{
  flex:1;
  text-align:center;
  padding:12px;
  font-weight:bold;
  color:#000;
}

.whatsapp{background:#25D366;}
.telegram{background:#229ED9;}
.imo{background:#00AEEF;}
</style>

</head>

<body>

<div class="container">

<div class="lang">
<a href="en.html">🇬🇧 English</a>
</div>

<h1>МЕНЯЕМ ДЕНЬГИ МЕЖДУ СТРАНАМИ</h1>

Обменять
<div id="fomo" class="fomo"></div>

<h2>Как работает</h2>
<div class="card checks">
✔ Пишете → получаете курс<br>
✔ Делаете перевод<br>
✔ Получаете деньги
</div>

<h2>Скриншоты</h2>
<div class="screens">
<img src="IMG_ru/1.jpg">
<img src="IMG_ru/2.jpg">
<img src="IMG_ru/3.jpg">
<img src="IMG_ru/4.jpg">
<img src="IMG_ru/5.jpg">
<img src="IMG_ru/6.jpg">
<img src="IMG_ru/7.jpg">
<img src="IMG_ru/8.jpg">
<img src="IMG_ru/9.jpg">
<img src="IMG_ru/10.jpg">
</div>

<h2>Видео отзывы</h2>

<div id="videos"></div>

</div>

<div class="contact-fixed">
<div class="cf-btn whatsapp">WhatsApp</div>
<div class="cf-btn telegram">Telegram</div>
<div class="cf-btn imo">IMO</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

/* FOMO */
const list=[
{name:'Александр',text:'2300 USD'},
{name:'Мария',text:'1500 EUR'},
{name:'Илья',text:'53 000 RUB'},
{name:'Аноним',text:'22 000 USDT'}
];

let i=0;
const f=document.getElementById('fomo');

function update(){
f.style.opacity=0;
setTimeout(()=>{
let d=list[i];
f.innerHTML=`<img src="https://i.pravatar.cc/50?img=${Math.floor(Math.random()*70)}">
<div><b>${d.name}</b> обменял ${d.text}</div>`;
f.style.opacity=1;
i=(i+1)%list.length;
},300);
}
update();
setInterval(update,4000);


/* создаём 14 видео */
const container=document.getElementById('videos');

for(let i=1;i<=14;i++){
const div=document.createElement('div');
div.className='video-item';
div.innerHTML=`
<img src="POS_ru/${i}.jpg">
<div class="play">▶</div>
`;
div.dataset.src=`REW_ru/${i}.mp4`;
container.appendChild(div);
}


/* lazy + звук + x2 */
document.querySelectorAll('.video-item').forEach(item=>{
item.addEventListener('click', function(){

if(this.querySelector('video')){
let v=this.querySelector('video');
v.muted=false;
v.playbackRate = v.playbackRate === 1 ? 2 : 1;
return;
}

const v=document.createElement('video');
v.src=this.dataset.src;
v.controls=true;
v.autoplay=true;
v.playsInline=true;

this.innerHTML='';
this.appendChild(v);

});
});

});
</script>

</body>
</html>
